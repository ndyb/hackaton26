<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skansen – Norsk tale-til-tekst</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="page">
    <header>
      <h1>Skansen</h1>
      <p class="subtitle">Norsk tale-til-tekst — benchmark</p>
    </header>

    <div class="record-section">
      <button id="record-btn" class="record-btn">Ta opp</button>
      <p class="hint">Trykk mellomrom for å starte/stoppe — sendes til begge</p>
      <div id="record-status" class="status info"></div>
    </div>

    <div class="panels">
      <div class="panel server-panel">
        <div class="panel-header">
          <h2>Server (CPU)</h2>
          <span class="badge">nb-whisper-medium q5</span>
        </div>
        <div id="server-status" class="status info"></div>
        <div class="metric" id="server-metric"></div>
        <div class="transcript-section">
          <div id="server-transcript" class="transcript">Venter på opptak...</div>
        </div>
      </div>

      <div class="panel browser-panel">
        <div class="panel-header">
          <h2>Browser (WebGPU)</h2>
          <span class="badge" id="browser-badge">nb-whisper-small</span>
        </div>
        <div id="browser-status" class="status info">Klikk "Last modell" for å starte</div>
        <div class="metric" id="browser-metric"></div>
        <div class="transcript-section">
          <div id="browser-transcript" class="transcript">Venter på opptak...</div>
        </div>
        <button id="load-model-btn" class="load-btn">Last modell</button>
      </div>
    </div>

    <div class="history-section">
      <h2>Benchmark-historikk</h2>
      <div id="history" class="history"></div>
    </div>
  </div>

  <script src="/app.js" type="module"></script>
</body>
</html>
