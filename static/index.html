<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skansen – Norsk tale-til-tekst</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>Skansen</h1>
    <p class="subtitle">Norsk tale-til-tekst</p>
  </header>

  <div class="toolbar">
    <button id="record-btn" class="record-btn">Ta opp</button>
    <div id="record-status" class="status info"></div>
  </div>

  <section class="panel main-panel">
    <div class="panel-top">
      <h2>Transkribering</h2>
      <span class="badge blue">nb-whisper-medium</span>
    </div>
    <div class="metric" id="metric">&mdash;</div>
    <div id="status" class="status info"></div>
    <div class="transcript" id="transcript">Trykk Ta opp eller mellomrom for å starte...</div>
    <button id="tts-btn" class="tts-btn" style="display:none">Les opp</button>
  </section>

  <section class="history-section">
    <h2>Historikk</h2>
    <div id="history" class="history"></div>
  </section>

  <footer id="version-footer"></footer>

  <script src="/app.js" type="module"></script>
</body>
</html>
