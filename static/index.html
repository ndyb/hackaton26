<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skansen – Norsk tale-til-tekst</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>Skansen</h1>
    <p class="subtitle">Norsk tale-til-tekst — benchmark</p>
  </header>

  <div class="toolbar">
    <button id="record-btn" class="record-btn">Ta opp</button>
    <div id="record-status" class="status info"></div>
  </div>

  <div class="panels">
    <section class="panel">
      <div class="panel-top">
        <h2>Server (CPU)</h2>
        <span class="badge blue">nb-whisper-medium q5</span>
      </div>
      <div class="metric" id="server-metric">&mdash;</div>
      <div id="server-status" class="status info"></div>
      <div class="transcript" id="server-transcript">Venter på opptak...</div>
    </section>

    <section class="panel">
      <div class="panel-top">
        <h2>Browser</h2>
        <span class="badge green" id="browser-badge">nb-whisper-small</span>
      </div>
      <div class="metric" id="browser-metric">&mdash;</div>
      <div id="browser-status" class="status info">Trykk knappen under for å laste modell</div>
      <div class="transcript" id="browser-transcript">Venter på opptak...</div>
      <button id="load-model-btn" class="load-btn">Last inn modell</button>
    </section>
  </div>

  <section class="history-section">
    <h2>Historikk</h2>
    <div id="history" class="history"></div>
  </section>

  <footer id="version-footer"></footer>

  <script src="/app.js" type="module"></script>
</body>
</html>
